name: Test & Quality Checks

on:
  push:
    branches: [ main, develop ]
    # WHY: Skip CI if only documentation, config, or non-code files changed
    # This saves significant CI minutes by avoiding unnecessary runs
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'
      - '.github/workflows/*.md'
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened, ready_for_review]
    # WHY: Skip CI on draft PRs - wait until PR is ready for review
    # This prevents wasting minutes on incomplete work
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'
      - '.github/workflows/*.md'
  # WHY: The expensive iOS-simulator E2E job runs nightly and on-demand instead
  # of gating every push (it's slow and non-blocking). See the integration-test
  # job's `if:` below.
  schedule:
    - cron: '23 5 * * *' # daily ~05:23 UTC (off-peak, non-round minute)
  workflow_dispatch:

# WHY: Only run expensive jobs on certain conditions to save CI minutes
# - Unit tests: Always run (cheap, ubuntu)
# - Golden tests: Only on main branch and non-draft PRs
# - Integration tests: Only on main branch merges (very expensive)
# - iOS build: Only on main branch merges

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15  # WHY: Prevent hanging tests from wasting minutes

    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true  # WHY: Cache Flutter SDK to reduce setup time

      - name: Cache pub dependencies
        uses: actions/cache@v6
        with:
          # WHY: cache only the pub download cache. Caching .dart_tool (the
          # build_runner entrypoint + build cache) is fragile across codegen-tool
          # upgrades: a stale entrypoint from build_runner 2.7 broke under 2.15
          # ("Couldn't resolve build_runner_core"). The -v2- key namespace also
          # retires the previously poisoned caches that restore-keys would match.
          path: ~/.pub-cache
          key: ${{ runner.os }}-pubcache-v2-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pubcache-v2-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze code
        run: flutter analyze

      - name: Run unit and widget tests
        timeout-minutes: 10  # WHY: Limit test execution time
        run: flutter test --coverage --exclude-tags=golden --concurrency=1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Check coverage threshold
        run: |
          if [ -f coverage/lcov.info ]; then
            # Try to extract coverage using lcov if available
            if command -v lcov &> /dev/null; then
              coverage=$(lcov --summary coverage/lcov.info 2>&1 | grep -oP 'lines\.*: \K[0-9.]*' || echo "0")
            else
              # Fallback: parse lcov.info directly
              LF=$(grep "^LF:" coverage/lcov.info | tail -1 | awk '{print $2}' || echo "0")
              LH=$(grep "^LH:" coverage/lcov.info | tail -1 | awk '{print $2}' || echo "0")
              if [ "$LF" != "0" ] && [ -n "$LF" ]; then
                coverage=$(echo "scale=2; $LH * 100 / $LF" | bc || echo "0")
              else
                coverage="0"
              fi
            fi
            echo "Current coverage: ${coverage}%"
            echo "Target threshold: 70%"
            # Check if bc is available for comparison
            if command -v bc &> /dev/null; then
              if (( $(echo "$coverage < 70" | bc -l) )); then
                echo "⚠️ Coverage is below 70% threshold (current: ${coverage}%)"
                echo "This is a warning - build will continue. Please continue improving coverage."
                # Don't fail the build - coverage improvement is in progress
              else
                echo "✅ Coverage meets threshold!"
              fi
            else
              # Simple string comparison if bc not available
              COVERAGE_INT=$(echo "$coverage" | cut -d. -f1)
              if [ "$COVERAGE_INT" -lt 70 ] 2>/dev/null; then
                echo "⚠️ Coverage is below 70% threshold (current: ${coverage}%)"
                echo "This is a warning - build will continue. Please continue improving coverage."
              else
                echo "✅ Coverage meets threshold!"
              fi
            fi
          else
            echo "⚠️ Coverage file not found. Skipping threshold check."
          fi

  golden-check:
    name: Verify Golden Tests
    runs-on: macos-15
    timeout-minutes: 15  # WHY: Limit expensive macOS job time
    # WHY: Only run golden tests on main branch or when PR is ready (not draft)
    # This saves ~30-50 minutes per run on macOS
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    needs: test  # WHY: Only run if unit tests pass

    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v6
        with:
          # WHY: cache only the pub download cache. Caching .dart_tool (the
          # build_runner entrypoint + build cache) is fragile across codegen-tool
          # upgrades: a stale entrypoint from build_runner 2.7 broke under 2.15
          # ("Couldn't resolve build_runner_core"). The -v2- key namespace also
          # retires the previously poisoned caches that restore-keys would match.
          path: ~/.pub-cache
          key: ${{ runner.os }}-pubcache-v2-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pubcache-v2-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run golden tests (strict mode)
        timeout-minutes: 10  # WHY: Limit test execution time
        run: flutter test test/golden/

  integration-test:
    name: Integration Tests (E2E) - iOS Simulator
    runs-on: macos-15
    timeout-minutes: 20  # WHY: Reduced from 30 to save minutes on hanging tests
    # WHY: Only run expensive integration tests on main branch merges
    # Saves ~100-300 minutes per run - only run when code is actually merged
    #
    # PLATFORM-SPECIFIC TESTING:
    # These integration tests run on iOS simulator using native iOS SQLite
    # (SqfliteDarwinDatabase), not FFI. This helps catch platform-specific issues
    # like PRAGMA exceptions on read-only databases that don't appear in FFI-based
    # unit tests. The integration tests verify that database operations work
    # correctly in the actual iOS environment.
    # WHY: E2E is expensive (~20 min) and non-blocking, so it no longer gates
    # every push/PR. It runs on the nightly schedule and via manual dispatch.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: test  # WHY: Only run if unit tests pass

    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v6
        with:
          # WHY: cache only the pub download cache. Caching .dart_tool (the
          # build_runner entrypoint + build cache) is fragile across codegen-tool
          # upgrades: a stale entrypoint from build_runner 2.7 broke under 2.15
          # ("Couldn't resolve build_runner_core"). The -v2- key namespace also
          # retires the previously poisoned caches that restore-keys would match.
          path: ~/.pub-cache
          key: ${{ runner.os }}-pubcache-v2-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pubcache-v2-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Setup iOS Simulator
        run: |
          # List available simulators
          echo "Available iOS simulators:"
          xcrun simctl list devices available | grep -i "iphone" || echo "No iPhone simulators found"

          # Get the first available iPhone simulator UUID
          SIMULATOR_UUID=$(xcrun simctl list devices available | grep -i "iphone" | grep -i "available" | head -1 | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' || echo "")

          if [ -z "$SIMULATOR_UUID" ]; then
            # Try to get any iPhone device (including already booted ones)
            SIMULATOR_UUID=$(xcrun simctl list devices | grep -i "iphone" | grep -v "unavailable" | head -1 | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' || echo "")
          fi

          if [ -z "$SIMULATOR_UUID" ]; then
            echo "❌ No iOS simulator found!"
            echo "Listing all devices:"
            xcrun simctl list devices
            exit 1
          fi

          echo "Found iOS simulator: $SIMULATOR_UUID"
          echo "SIMULATOR_UUID=$SIMULATOR_UUID" >> $GITHUB_ENV

          # Boot the simulator
          echo "Booting iOS simulator..."
          xcrun simctl boot "$SIMULATOR_UUID" 2>&1 || echo "Simulator may already be booted"

          # Open Simulator.app so Flutter can detect it
          echo "Opening Simulator.app..."
          open -a Simulator || echo "Could not open Simulator.app"

          # Wait for simulator to be ready (reduced from 15s to 10s)
          echo "Waiting for simulator to be ready..."
          sleep 10

          # Verify simulator is booted
          if xcrun simctl list devices | grep "$SIMULATOR_UUID" | grep -q "Booted"; then
            echo "✅ Simulator is booted and ready"
          else
            echo "⚠️ Simulator boot status unclear, but continuing..."
          fi

      - name: Run integration tests
        # WHY: Integration tests are non-blocking by design (the script swallows
        # test failures via `|| TEST_FAILED=1`; correctness is gated by the
        # unit/widget + golden jobs). The in-script swallow can't catch a
        # step-level timeout/hang, which on a newer CI runner (slower iOS build
        # due to the CocoaPods->SPM migration) was hard-failing all of CI.
        # continue-on-error keeps the documented non-blocking intent even then.
        continue-on-error: true
        timeout-minutes: 15  # WHY: Reduced timeout to save minutes
        run: |
          echo "Waiting for Flutter to detect iOS simulator..."
          sleep 5

          # List all Flutter devices
          echo "Available Flutter devices:"
          flutter devices

          # Use the simulator UUID we booted (it's the device ID Flutter needs)
          if [ -n "$SIMULATOR_UUID" ]; then
            echo ""
            echo "✅ Using iOS simulator UUID: $SIMULATOR_UUID"
            echo "Running integration tests on iOS simulator..."
            echo "Note: First build can take 2-3 minutes, tests typically take 5-10 minutes total"
            echo "There are 17 integration tests across 3 files"
            echo ""
            # WHY: Run only critical integration test to save time
            # Run critical user journeys first - most important test
            echo ""
            echo "Running critical user journeys test..."
            echo ""

            TEST_FAILED=0

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Test: critical_user_journeys_test.dart"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            flutter test integration_test/critical_user_journeys_test.dart -d "$SIMULATOR_UUID" --reporter expanded --timeout=15m || TEST_FAILED=1

            # WHY: This job only runs nightly / on manual dispatch, so run the
            # full set of integration test files for thorough coverage.
            if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "Test: smoke_journeys_test.dart"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              flutter test integration_test/smoke_journeys_test.dart -d "$SIMULATOR_UUID" --reporter expanded --timeout=15m || TEST_FAILED=1

              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "Test: user_journeys_test.dart"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              flutter test integration_test/user_journeys_test.dart -d "$SIMULATOR_UUID" --reporter expanded --timeout=15m || TEST_FAILED=1
            fi

            if [ "$TEST_FAILED" = "1" ]; then
              echo ""
              echo "⚠️ Some integration tests failed"
              echo "Integration tests are flaky on CI due to simulator issues"
              echo "This is non-blocking - core functionality is covered by unit/widget tests"
              # Don't fail the build - integration tests are flaky
            else
              echo ""
              echo "✅ All integration tests passed!"
            fi
          else
            echo "❌ No simulator UUID found!"
            echo ""
            echo "Debug information:"
            echo "Available Flutter devices:"
            flutter devices
            exit 1
          fi

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: test_driver/
          # WHY: integration tests don't emit files to test_driver/ (legacy path);
          # silence the "no files were found" warning instead of failing/uploading.
          if-no-files-found: ignore

  ios-build:
    name: iOS Build Check
    runs-on: macos-15
    timeout-minutes: 20  # WHY: Limit build time
    # WHY: Only run iOS build on main branch merges
    # Saves ~50-100 minutes per run
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
       github.ref == 'refs/heads/main' &&
       github.event.pull_request.draft == false)
    needs: test  # WHY: Only run if unit tests pass

    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v6
        with:
          # WHY: cache only the pub download cache. Caching .dart_tool (the
          # build_runner entrypoint + build cache) is fragile across codegen-tool
          # upgrades: a stale entrypoint from build_runner 2.7 broke under 2.15
          # ("Couldn't resolve build_runner_core"). The -v2- key namespace also
          # retires the previously poisoned caches that restore-keys would match.
          path: ~/.pub-cache
          key: ${{ runner.os }}-pubcache-v2-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pubcache-v2-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze code
        run: flutter analyze

      # WHY: Unit/widget tests are already run by the "Run Tests" job (ubuntu).
      # This job only needs to verify the iOS build compiles, so the duplicate
      # test run was removed to save ~2 min of macOS time per push.

      - name: Cache CocoaPods
        uses: actions/cache@v6
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install iOS pods
        working-directory: ios
        run: pod install --repo-update

      - name: Build iOS (no codesign)
        timeout-minutes: 15  # WHY: Limit build time
        run: flutter build ios --no-codesign
